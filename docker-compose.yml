services:
  api:
    build: .
    container_name: machinaai-api
    env_file:
      - .env
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - .:/app

  postgres:
    image: postgres:16-alpine
    container_name: machinaai-postgres
    environment:
      POSTGRES_DB: machinaai
      POSTGRES_USER: machinaai
      POSTGRES_PASSWORD: machinaai
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U machinaai -d machinaai"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
