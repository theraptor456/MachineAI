version: '3.8'

services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: machineai
      POSTGRES_PASSWORD: machineai_pass
      POSTGRES_DB: machineai_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://machineai:machineai_pass@db:5432/machineai_db
    depends_on:
      - db
    volumes:
      - ./backend:/app

volumes:
  postgres_data: